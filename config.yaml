healthCheckTimeout: 30

macros:
  "server-flags": "-ngl 99 -np 1 -fa on --no-mmap -fitt ${env.VRAM_BUFFER} -cram -1 --cache-type-k ${env.CTX_QUANT} --cache-type-v ${env.CTX_QUANT}"
  "qwen-chat":    "--temp 1.0 --top-p 0.95 --top-k 20 --min-p 0.00 --presence-penalty 1.5 --repeat-penalty 1.0 --n-predict 32768"
  "glm-chat":     "--temp 1.0 --top-p 0.95 --min-p 0.01 --repeat-penalty 1.0"

models:

  # --- Qwen3.5 27B ---

  "qwen3.5-27b@q5-200k":
    proxy: "http://127.0.0.1:${PORT}"
    ttl: 1800
    name: "Qwen 3.5 27B · UD-Q5_K_XL - 200,000 (unsloth)"
    cmd: >
      ./llama.cpp/llama-server --port ${PORT}
      --model models/Qwen3.5-27B-UD-Q5_K_XL.gguf
      ${server-flags}
      ${qwen-chat}

  # --- Qwen3.5 35B-A3B ---

  "qwen3.5-35b-a3b@q5-262k":
    proxy: "http://127.0.0.1:${PORT}"
    ttl: 1800
    name: "Qwen 3.5 35B-A3B · UD-Q5_K_XL - 262,144 (unsloth)"
    cmd: >
      ./llama.cpp/llama-server --port ${PORT}
      --model models/Qwen3.5-35B-A3B-UD-Q5_K_XL.gguf
      ${server-flags}
      ${qwen-chat}

  # --- GLM-4.7 Flash ---

  "glm4.7-flash@q5":
    proxy: "http://127.0.0.1:${PORT}"
    ttl: 1800
    name: "GLM-4.7 Flash · UD-Q5_K_XL"
    cmd: >
      ./llama.cpp/llama-server --port ${PORT}
      --model models/GLM-4.7-Flash-UD-Q5_K_XL.gguf
      ${server-flags}
      ${glm-chat}
